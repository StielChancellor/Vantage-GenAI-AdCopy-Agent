steps:
  # Build the Docker image — using Artifact Registry (Container Registry is deprecated)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/vantage/backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/vantage/backend:latest'
      - '.'

  # Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/vantage/backend:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/vantage/backend:latest']

  # Deploy to Cloud Run — global region (us-central1), upgraded resources
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'vantage-adcopy-agent'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/vantage/backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--service-account=vantage-cloudrun-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--no-cpu-throttling'
      - '--update-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=us-central1,VERTEX_AI_LOCATION=us-central1,GEMINI_MODEL=gemini-2.5-flash,BQ_DATASET=vantage,CLOUD_TASKS_QUEUE=vantage-ingestion,CLOUD_TASKS_LOCATION=us-central1,GCS_UPLOADS_BUCKET=vantage-uploads-$PROJECT_ID,GCS_FAILED_BUCKET=vantage-failed-ingestion-$PROJECT_ID,ENVIRONMENT=production'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/vantage/backend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/vantage/backend:latest'

timeout: '1200s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
